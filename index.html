<!DOCTYPE html>
<html>
<head>
    <title>Airbnb Clone</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>Airbnb Clone</h1>
</header>

<div class="search">
    <input type="text" id="searchBox" placeholder="Search Location" onkeyup="searchProperty()">
</div>

<div class="container">

    <div class="card">
        <h2>Beach House</h2>
        <p>Location: Goa</p>
        <p>Price: ₹5000/night</p>
        <button onclick="book()">Book Now</button>
    </div>

    <div class="card">
        <h2>City Apartment</h2>
        <p>Location: Hyderabad</p>
        <p>Price: ₹3000/night</p>
        <button onclick="book()">Book Now</button>
    </div>

    <div class="card">
        <h2>Hill View Cottage</h2>
        <p>Location: Ooty</p>
        <p>Price: ₹4000/night</p>
        <button onclick="book()">Book Now</button>
    </div>
    
    <div class="card">
        <h2>Lake View Villa</h2>
        <p>Location: Kerala</p>
        <p>Price: ₹4500/night</p>
        <button onclick="book()">Book Now</button>
    </div>
</div>

<script src="script.js"></script>

</body>
</html>
